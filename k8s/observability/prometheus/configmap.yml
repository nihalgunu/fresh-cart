apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alert_rules.yml

    scrape_configs:
      - job_name: 'api-gateway'
        static_configs:
          - targets: ['api-gateway.ecommerce.svc.cluster.local:8080']
        metrics_path: /metrics

      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service.ecommerce.svc.cluster.local:8081']
        metrics_path: /metrics

      - job_name: 'product-service'
        static_configs:
          - targets: ['product-service.ecommerce.svc.cluster.local:8082']
        metrics_path: /metrics

      - job_name: 'order-service'
        static_configs:
          - targets: ['order-service.ecommerce.svc.cluster.local:8083']
        metrics_path: /metrics

      - job_name: 'notification-service'
        static_configs:
          - targets: ['notification-service.ecommerce.svc.cluster.local:8084']
        metrics_path: /metrics

  alert_rules.yml: |
    groups:
      - name: freshcart_alerts
        rules:
          - alert: HighErrorRate
            expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service) > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.service }}"
              description: "Error rate is above 5% for {{ $labels.service }}"

          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "{{ $labels.job }} has been down for more than 1 minute"

          - alert: HighLatency
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ $labels.service }}"
              description: "p95 latency is above 2 seconds for {{ $labels.service }}"

          - alert: LowInventory
            expr: inventory_level < 5
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Low inventory for product {{ $labels.product_id }}"
              description: "Stock level is below 5 units"
